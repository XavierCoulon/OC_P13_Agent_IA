services:

  # ── API FastAPI ────────────────────────────────────────────────────────────
  api:
    build: ./backend
    container_name: chess-api
    ports:
      - "${API_PORT:-8000}:8000"
    env_file: .env
    environment:
      MONGO_URI: mongodb://mongodb:27017
      MILVUS_HOST: milvus
      MILVUS_PORT: 19530
    depends_on:
      mongodb:
        condition: service_healthy
      milvus:
        condition: service_healthy
    networks:
      - chess-net
    restart: unless-stopped

  # ── MongoDB ────────────────────────────────────────────────────────────────
  mongodb:
    image: mongo:7
    container_name: chess-mongodb
    ports:
      - "${MONGO_PORT:-27017}:27017"
    volumes:
      - mongo_data:/data/db
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - chess-net
    restart: unless-stopped

  # ── Milvus (standalone) ────────────────────────────────────────────────────
  etcd:
    image: quay.io/coreos/etcd:v3.5.14
    container_name: chess-etcd
    environment:
      ETCD_AUTO_COMPACTION_MODE: revision
      ETCD_AUTO_COMPACTION_RETENTION: "1000"
      ETCD_QUOTA_BACKEND_BYTES: "4294967296"
      ETCD_SNAPSHOT_COUNT: "50000"
    command: >
      etcd
      --advertise-client-urls=http://etcd:2379
      --listen-client-urls=http://0.0.0.0:2379
      --data-dir=/etcd
    volumes:
      - etcd_data:/etcd
    networks:
      - chess-net
    restart: unless-stopped

  minio:
    image: minio/minio:RELEASE.2024-05-10T01-41-38Z
    container_name: chess-minio
    environment:
      MINIO_ACCESS_KEY: minioadmin
      MINIO_SECRET_KEY: minioadmin
    command: minio server /minio_data --console-address ":9001"
    volumes:
      - minio_data:/minio_data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 30s
      timeout: 20s
      retries: 3
    networks:
      - chess-net
    restart: unless-stopped

  milvus:
    image: milvusdb/milvus:v2.4.17
    container_name: chess-milvus
    command: ["milvus", "run", "standalone"]
    security_opt:
      - seccomp:unconfined
    environment:
      ETCD_ENDPOINTS: etcd:2379
      MINIO_ADDRESS: minio:9000
    ports:
      - "${MILVUS_PORT:-19530}:19530"
      - "9091:9091"
    volumes:
      - milvus_data:/var/lib/milvus
    depends_on:
      - etcd
      - minio
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9091/healthz"]
      interval: 30s
      timeout: 20s
      retries: 3
      start_period: 90s
    networks:
      - chess-net
    restart: unless-stopped

  # ── Frontend Angular (activé à l'étape suivante) ──────────────────────────
  # frontend:
  #   build: ./frontend
  #   container_name: chess-frontend
  #   ports:
  #     - "${FRONTEND_PORT:-4200}:80"
  #   depends_on:
  #     - api
  #   networks:
  #     - chess-net

networks:
  chess-net:
    driver: bridge

volumes:
  mongo_data:
  milvus_data:
  etcd_data:
  minio_data:
